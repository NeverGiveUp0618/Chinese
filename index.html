<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5e6c8">
<title>寻宝作文记</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  /* 牛皮纸 + 藏宝图的味道，和英语App的糖果粉拉开距离 */
  background: linear-gradient(170deg, #f7ecd5 0%, #f0e0c0 50%, #e8d5b0 100%);
  background-attachment: fixed;
  color: #4a3c28;
  user-select: none; -webkit-user-select: none;
  overflow: hidden;
}
#app { height: 100%; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; }

/* ---- 顶栏 ---- */
.hubLink { flex:0 0 auto; align-self:flex-start; margin:calc(env(safe-area-inset-top,0px) + 8px) 14px 0; padding:7px 12px; border-radius:16px; background:rgba(255,250,240,.82); box-shadow:0 2px 8px rgba(140,110,70,.2); color:#8a6a3a; font-size:12px; font-weight:800; text-decoration:none; letter-spacing:.02em; }
.hubLink:active { transform:scale(.96); }
#topbar { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 7px 14px 10px; }
#backBtn { width: 38px; height: 38px; border: none; border-radius: 50%; background: #fffaf0; box-shadow: 0 2px 8px rgba(140,110,70,.25); font-size: 18px; color: #8a6a3a; visibility: hidden; }
#barTitle { flex: 1; font-size: 18px; font-weight: 800; color: #7a5a2a; text-align: center; letter-spacing: .5px; }
#coinBox { background: #fffaf0; border-radius: 20px; padding: 6px 12px; font-size: 15px; font-weight: 700; color: #c08a2a; box-shadow: 0 2px 8px rgba(140,110,70,.25); }

#screens { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 14px 20px; }
.screen { display: none; animation: fadeIn .25s ease; }
.screen.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---- 底部导航 ---- */
#tabbar { flex: 0 0 auto; display: flex; background: rgba(255,250,240,.95); border-radius: 24px 24px 0 0; box-shadow: 0 -4px 16px rgba(140,110,70,.2); padding: 6px 6px calc(env(safe-area-inset-bottom,0px) + 6px); }
.tab { flex: 1; border: none; background: none; text-align: center; padding: 6px 0 4px; border-radius: 16px; }
.tab .ti { font-size: 23px; display: block; filter: grayscale(.55); transition: .15s; }
.tab .tn { font-size: 11px; color: #b0997a; }
.tab.on { background: #f5e6c8; }
.tab.on .ti { filter: none; transform: scale(1.1); }
.tab.on .tn { color: #a06a2a; font-weight: 700; }

/* ---- 卡片 / 按钮 ---- */
.card { background: rgba(255,252,245,.95); border-radius: 18px; padding: 16px; box-shadow: 0 4px 14px rgba(140,110,70,.16); margin-bottom: 14px; }
.btn { display: block; width: 100%; border: none; border-radius: 16px; padding: 14px; font-size: 17px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #d9a441, #c07a2c); box-shadow: 0 4px 12px rgba(190,130,50,.35); transition: transform .1s; }
.btn:active { transform: scale(.96); }
.btn.ghost { background: #fffaf0; color: #a06a2a; box-shadow: 0 2px 8px rgba(140,110,70,.2); }
.btn.small { width: auto; display: inline-block; padding: 10px 18px; font-size: 15px; }
.btn:disabled { opacity: .45; }
.sectionTitle { font-size: 15px; font-weight: 800; color: #8a6a2a; margin: 6px 2px 8px; }
.actRow { display:flex; align-items:center; gap:12px; }

/* ---- 首页 ---- */
#buddyCard { text-align: center; position: relative; }
#buddyE { margin:0 auto; }
#buddyE.bounce { animation: bounce .5s; }
.wardrobeBridge { display:block; margin:9px auto 0; padding:7px 12px; border:1px solid #ead9b9; border-radius:15px; background:#fff9eb; color:#9a6b24; font-size:11px; font-weight:700; }
.buddyAvatar { position:relative; display:inline-block; vertical-align:middle; flex:none; }
.buddyBodyImg { position:absolute; z-index:2; inset:0; width:100%; height:100%; object-fit:contain; }
.buddyShared { position:absolute; z-index:3; line-height:1; pointer-events:none; filter:drop-shadow(0 1px 2px rgba(80,55,30,.18)); }
.buddyShared img { width:100%; height:auto; display:block; }
.buddyGear { position:absolute; z-index:3; line-height:1; filter:drop-shadow(0 2px 2px rgba(80,55,30,.2)); }
.buddyGear.head { font-size:38px; left:34%; top:0; transform:rotate(-5deg); }
.buddyGear.hand { font-size:30px; right:1%; bottom:12%; transform:rotate(8deg); }
.buddyGear.back { z-index:1; font-size:42px; left:0; bottom:11%; transform:rotate(-8deg); }
.btn .buddyAvatar { margin:-7px 5px -7px 0; }
@keyframes bounce { 0%,100% { transform: none; } 30% { transform: translateY(-14px) scale(1.08); } 60% { transform: translateY(0) scale(.96); } }
#buddySay { font-size: 14px; color: #7a5a2a; background: #f7ecd5; border-radius: 14px; padding: 8px 12px; margin-top: 6px; line-height: 1.5; }
.taskRow { display: flex; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px dashed #ecdcc0; }
.taskRow:last-child { border-bottom: none; }
.taskRow .tIcon { font-size: 22px; }
.taskRow .tName { flex: 1; font-size: 14px; }
.taskRow .tProg { font-size: 13px; color: #c0a070; font-weight: 700; }
.taskRow.done .tName { color: #a8bd8f; text-decoration: line-through; }
.taskRow.done .tProg { color: #6a9a4a; }
.homeGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.homeGrid .card { margin-bottom: 0; text-align: center; padding: 14px 8px; }
.homeGrid .hIcon { font-size: 32px; }
.homeGrid .hName { font-size: 14px; font-weight: 700; margin-top: 4px; color: #7a5a2a; }
.homeGrid .hSub { font-size: 11px; color: #b0997a; margin-top: 2px; }
.homeGrid .transferReady { border:2px solid #d9a441; background:linear-gradient(145deg,#fffdf7,#fff3d6); }
.homeGrid .transferReady .hName::after { content:" 可用了"; color:#6a9a4a; font-size:10px; }
.nextPrize { display:flex; align-items:center; gap:10px; padding:12px 14px; border:2px solid #ead09a; background:linear-gradient(145deg,#fffdf7,#fff5dc); cursor:pointer; }
.nextPrizeIcon { font-size:34px; }
.nextPrize b { display:block; color:#7a5a2a; font-size:14px; }
.nextPrize small { display:block; color:#9b8058; font-size:11px; line-height:1.55; }

/* ---- 探险护照：所有成果只增加，不惩罚断签 ---- */
.passportHero { display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,#fff8df,#f5e2b9); }
.passportHero b { display:block; font-size:18px; color:#7a5a2a; }
.passportHero small { display:block; margin-top:3px; font-size:11px; line-height:1.5; color:#9b8058; }
.passportStats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.passportStats div { background:#fffdf7; border-radius:14px; padding:10px 4px; text-align:center; box-shadow:0 2px 8px rgba(140,110,70,.12); }
.passportStats b { display:block; font-size:20px; color:#c07a2c; }
.passportStats small { font-size:10px; color:#a58d6b; }
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:12px; }
.calendar span { min-height:34px; display:flex; align-items:center; justify-content:center; position:relative; border-radius:10px; font-size:12px; color:#8f7a5d; }
.calendar .week { min-height:22px; font-weight:700; color:#b0997a; }
.calendar .day.today { outline:2px solid #d9a441; font-weight:800; }
.calendar .day.checked { background:#fff0bd; color:#7a5a2a; font-weight:800; }
.calendar .day i { position:absolute; right:-1px; bottom:-4px; font-style:normal; font-size:12px; }
.stampGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
.stamp { min-width:0; background:rgba(255,253,247,.65); border:2px dashed #d9ccb5; border-radius:50% 50% 45% 45%; aspect-ratio:1/1.06; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; filter:grayscale(1); opacity:.55; }
.stamp.earned { background:#fff8df; border-color:#d9a441; filter:none; opacity:1; box-shadow:0 2px 8px rgba(170,115,35,.16); }
.stamp span { font-size:25px; }
.stamp b { font-size:11px; color:#7a5a2a; }
.stamp small { max-width:90%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:8px; color:#a58d6b; }
.medalRow { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.routeMedal { background:#eee8dc; border-radius:15px; padding:10px 5px; text-align:center; opacity:.58; }
.routeMedal.earned { background:linear-gradient(145deg,#fff4c9,#f5d77e); opacity:1; box-shadow:0 3px 9px rgba(170,115,35,.2); }
.routeMedal span,.routeMedal b,.routeMedal small { display:block; }
.routeMedal span { font-size:27px; }.routeMedal b { font-size:10px; color:#795728; }.routeMedal small { font-size:8px; color:#9b8058; margin-top:2px; }
.outfitPreview { display:flex; align-items:center; gap:7px; padding:10px; }
.outfitPreview b { display:block; font-size:14px; color:#7a5a2a; }.outfitPreview small { display:block; font-size:10px; line-height:1.5; color:#9b8058; }
.gearGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
.gearItem { min-width:0; border:2px solid #e3d5ba; border-radius:15px; background:#fffdf7; padding:10px 6px; font-family:inherit; color:#7a5a2a; }
.gearItem span,.gearItem b,.gearItem small { display:block; }.gearItem span { font-size:30px; }.gearItem b { font-size:12px; }.gearItem small { font-size:9px; color:#a58d6b; margin-top:2px; }
.gearItem.locked { filter:grayscale(1); opacity:.55; }.gearItem.on { border-color:#6a9a4a; background:#edf8e7; box-shadow:0 0 0 2px rgba(106,154,74,.12); }

/* ---- 卡通探险路线图（不是地理比例地图，不绘制国界） ---- */
.adventureMap { position: relative; padding: 24px 0 12px; overflow: hidden; }
.routeChapter { background:rgba(255,253,247,.5); border:2px solid rgba(217,164,65,.18); border-radius:20px; padding:10px 8px 2px; margin-bottom:14px; }
.routeTitle { display:flex; align-items:center; gap:9px; font-size:22px; font-weight:800; color:#7a5a2a; padding:2px 8px 0; }
.routeTitle small { display:block; font-size:11px; font-weight:400; color:#b0997a; margin-top:1px; }
.adventureMap::before { content:""; position:absolute; left:50%; top:16px; bottom:18px; border-left:5px dotted #d7b56d; transform:translateX(-2px); }
.mapScenery { display:flex; justify-content:space-between; align-items:end; font-size:30px; padding:0 10px 8px; position:relative; z-index:1; }
.routeStop { width:calc(50% + 1px); position:relative; padding:7px 18px 7px 0; }
.routeStop.right { margin-left:auto; padding:7px 0 7px 18px; }
.routeDot { position:absolute; z-index:2; right:-9px; top:50%; width:18px; height:18px; border-radius:50%; background:#f8d36a; border:4px solid #fff8e8; box-shadow:0 1px 5px rgba(120,85,35,.28); transform:translateY(-50%); }
.routeStop.right .routeDot { right:auto; left:-9px; }
.routeStop.done .routeDot { background:#78b85a; }
.routeStop.locked .routeDot { background:#b8ad9a; }
.stopCard { display: flex; align-items: center; gap: 9px; margin:0; padding:11px 10px; cursor:pointer; border:2px solid rgba(217,164,65,.2); }
.routeStop.left .stopCard { border-radius:18px 8px 18px 18px; }
.routeStop.right .stopCard { border-radius:8px 18px 18px 18px; }
.stopCard.locked { opacity: .5; filter: grayscale(.7); }
.stopIcon { font-size: 32px; }
.stopInfo { flex: 1; }
.stopName { font-size: 16px; font-weight: 800; color: #7a5a2a; }
.stopSub { font-size: 12px; color: #b0997a; }
.stopStars { font-size: 12px; color: #d9a441; letter-spacing: 0; }
/* 三条原创漫画地图：参考相对方位，不使用中国轮廓、国界或省界 */
.comicMap { padding:0; overflow:hidden; }
.comicMap::before { display:none; }
.comicRoad { position:absolute; inset:8px 0 24px; width:100%; overflow:visible; }
.comicRoad path { fill:none; stroke-width:7; stroke-linecap:round; stroke-dasharray:1 13; filter:drop-shadow(0 2px 0 rgba(255,255,255,.65)); }
.mapCompass { position:absolute; z-index:3; left:12px; top:10px; width:34px; height:49px; border-radius:18px; background:rgba(255,255,255,.78); color:#765a3c; text-align:center; box-shadow:0 2px 7px rgba(70,55,35,.12); }
.mapCompass span,.mapCompass b { display:block; }.mapCompass span { font-size:22px; line-height:25px; }.mapCompass b { font-size:11px; }
.mapLegend { position:absolute; z-index:3; left:50%; bottom:8px; transform:translateX(-50%); width:94%; text-align:center; color:#806b52; font-size:9px; font-weight:700; letter-spacing:.02em; }
.comicStop { position:absolute; z-index:4; width:28%; padding:0; margin:0; }
.comicStop .stopCard { display:block; text-align:center; padding:7px 4px; border-radius:16px!important; background:rgba(255,253,244,.94); box-shadow:0 6px 14px rgba(70,55,35,.14); }
.comicStop .stopIcon { font-size:25px; line-height:1.1; }.comicStop .stopName { font-size:13px; white-space:nowrap; }.comicStop .stopName span { display:none; }.comicStop .stopSub { font-size:9px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }.comicStop .stopStars { font-size:9px; }
.comicStop .routeDot { width:22px; height:22px; border:5px solid rgba(255,255,255,.88); box-shadow:0 2px 7px rgba(70,55,35,.25); }.comicStop.left .routeDot { right:-14px; left:auto; }.comicStop.right .routeDot { left:-14px; right:auto; }
/* 山河奇境：拉萨向西，成都偏西北，厦门向东，三亚最南 */
.wonderMap { height:500px; background:linear-gradient(180deg,#eaf7ff 0%,#e7f5de 50%,#d8f2ef 100%); box-shadow:inset 0 0 28px rgba(45,112,130,.11); }
.wonderWash { position:absolute; inset:0; opacity:.26; background:radial-gradient(circle at 20% 25%,#fff 0 2px,transparent 3px),radial-gradient(circle at 75% 70%,#87c7bd 0 1px,transparent 2px); background-size:35px 35px,27px 27px; }
.wonderRoad { height:470px; }.wonderRoad path { stroke:#5ca39b; }
.wonderStop.step-0 { left:40%; top:188px; }.wonderStop.step-1 { right:0; top:178px; }.wonderStop.step-2 { left:24%; top:82px; }.wonderStop.step-3 { left:0; top:34px; }.wonderStop.step-4 { left:44%; top:392px; }.wonderStop.step-5 { left:50%; top:294px; }
.wonderDecor,.craftDecor { position:absolute; z-index:1; filter:drop-shadow(0 4px 4px rgba(50,70,60,.12)); }
.wonderDecor.snow { left:3%; top:112px; font-size:45px; }.wonderDecor.panda { left:48%; top:80px; font-size:35px; }.wonderDecor.river { left:25%; top:270px; font-size:54px; color:#6eb4c6; transform:rotate(28deg); }.wonderDecor.palms { right:4%; top:300px; font-size:37px; }.wonderDecor.sea { right:2%; bottom:35px; font-size:30px; }.wonderDecor.cloud { right:30%; top:12px; font-size:32px; }
/* 匠心风物：敦煌向西，哈尔滨在东北，江南城市集中在东部 */
.craftMap { height:470px; background:linear-gradient(180deg,#eef5ff 0%,#fff1d6 45%,#e7f1e5 100%); box-shadow:inset 0 0 28px rgba(87,80,110,.1); }
.craftWash { position:absolute; inset:0; opacity:.2; background:linear-gradient(115deg,transparent 48%,#c5ab7b 49%,transparent 50%),radial-gradient(circle,#afc6d4 0 1px,transparent 2px); background-size:70px 70px,25px 25px; }
.craftRoad { height:440px; }.craftRoad path { stroke:#9a87ad; }
.craftStop.step-0 { left:0; top:158px; }.craftStop.step-1 { right:0; top:212px; }.craftStop.step-2 { left:55%; top:328px; }.craftStop.step-3 { right:0; top:24px; }.craftStop.step-4 { left:55%; top:218px; }
.craftDecor.desert { left:2%; top:250px; font-size:43px; }.craftDecor.ice { right:28%; top:25px; font-size:31px; }.craftDecor.garden { left:38%; bottom:32px; font-size:38px; }.craftDecor.canal { right:1%; top:305px; font-size:31px; }.craftDecor.brush { left:36%; top:160px; font-size:35px; transform:rotate(-15deg); }
/* 古都时光线 */
.historyMap { height:470px; margin-top:8px; padding:0; border-radius:18px; background:linear-gradient(180deg,#fff7df 0%,#f8e6be 48%,#efd4a4 100%); box-shadow:inset 0 0 28px rgba(143,92,34,.12); }
.historyWash { position:absolute; inset:0; opacity:.22; background-image:radial-gradient(circle at 15% 15%,#cc9e56 0 1px,transparent 1.5px),radial-gradient(circle at 75% 30%,#d8ad69 0 1px,transparent 1.5px); background-size:21px 21px,29px 29px; }
.historyRoad { height:440px; }.historyRoad path { stroke:#c18a49; }
.historyStop { width:30%; }
/* 北京在北；西安向西；洛阳、开封依次向东；南京在东南 */
.historyStop.step-0 { right:3%; top:24px; }.historyStop.step-1 { left:2%; top:190px; }.historyStop.step-2 { left:35%; top:181px; }.historyStop.step-3 { right:2%; top:174px; }.historyStop.step-4 { right:0; top:330px; }
.historyStop .stopCard { border-color:#dfb873; }
.historyStop.left .stopCard,.historyStop.right .stopCard { border-radius:16px; }
.historyStop .routeDot { width:22px; height:22px; border:5px solid #fff4d6; background:#e7a93f; box-shadow:0 2px 7px rgba(110,65,20,.28); }
.historyStop.left .routeDot { right:-14px; left:auto; }.historyStop.right .routeDot { left:-14px; right:auto; }
.historyStop.done .routeDot { background:#6fae58; }.historyStop.locked .routeDot { background:#aaa08e; }
.historyDecor { position:absolute; z-index:1; font-size:42px; filter:sepia(.12) drop-shadow(0 4px 4px rgba(100,60,25,.12)); text-align:center; }
.historyDecor small { display:block; font-size:9px; color:#a4763e; font-weight:800; margin-top:-5px; }
.historyDecor.gate { right:35%; top:25px; }.historyDecor.tower { left:3%; top:105px; font-size:34px; }.historyDecor.scroll { left:40%; top:300px; font-size:35px; transform:rotate(8deg); }.historyDecor.river { left:5%; top:350px; font-size:25px; color:#79a7ad; transform:rotate(-12deg); }.historyDecor.school { right:30%; top:355px; font-size:38px; }
.historyCloud { position:absolute; right:36%; top:8px; font-size:30px; opacity:.68; }
@media (max-width:400px) {
  .adventureMap::before { left:18px; }
  .routeStop, .routeStop.right { width:100%; margin-left:0; padding:6px 0 6px 38px; }
  .routeDot, .routeStop.right .routeDot { left:9px; right:auto; }
  .routeStop.left .stopCard, .routeStop.right .stopCard { border-radius:8px 18px 18px 18px; }
  .mapScenery { padding-left:0; }
  .historyMap { height:470px; }
  .comicMap .comicStop { width:31%; margin:0; padding:0; }
  .wonderMap .wonderStop.step-0 { left:38%; }.wonderMap .wonderStop.step-1 { right:0; }.wonderMap .wonderStop.step-2 { left:22%; }.wonderMap .wonderStop.step-3 { left:0; }.wonderMap .wonderStop.step-4 { left:42%; }.wonderMap .wonderStop.step-5 { left:49%; }
  .craftMap .craftStop.step-0 { left:0; }.craftMap .craftStop.step-1 { right:0; }.craftMap .craftStop.step-2 { left:53%; }.craftMap .craftStop.step-3 { right:0; }.craftMap .craftStop.step-4 { left:53%; }
  .historyMap .historyStop { width:31%; }
  .historyMap .historyStop.step-0 { left:auto; right:2%; top:27px; }.historyMap .historyStop.step-1 { left:1%; right:auto; top:193px; }.historyMap .historyStop.step-2 { left:34%; right:auto; top:184px; }.historyMap .historyStop.step-3 { left:auto; right:1%; top:177px; }.historyMap .historyStop.step-4 { left:auto; right:0; top:333px; }
  .historyMap .historyStop.left .routeDot { left:auto; right:-14px; }.historyMap .historyStop.right .routeDot { left:-14px; right:auto; }
  .historyDecor.gate { right:35%; }.historyDecor.tower { left:1%; top:108px; }.historyDecor.scroll { left:39%; right:auto; top:300px; }.historyDecor.river { left:0; top:355px; }.historyDecor.school { right:28%; top:360px; opacity:.62; }
}

/* ---- 知识卡（她爱看的部分） ---- */
.kcard { background: #fffdf7; border-left: 4px solid #d9a441; border-radius: 0 14px 14px 0; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(140,110,70,.12); }
.kcard .kt { font-size: 15px; font-weight: 800; color: #8a5a2a; margin-bottom: 4px; }
.kcard .kd { font-size: 13.5px; line-height: 1.75; color: #5a4a34; }
.kcard .ke { font-size: 26px; float: right; margin-left: 8px; }
.clueOpts { display:flex; flex-direction:column; gap:10px; }
.clueOpt { width:100%; border:2px solid #ead9b8; border-radius:14px; background:#fffdf7; color:#5a4a34; padding:13px 12px; font-size:14px; line-height:1.55; font-family:inherit; text-align:left; }
.clueOpt.right { border-color:#78b85a; background:#edf8e7; color:#477234; }
.clueOpt.wrong { border-color:#d77a6a; background:#fff0ed; color:#a04a3c; }

/* ---- 写作区（核心） ---- */
.questBox { background: #fffdf7; border: 2px dashed #d9b871; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
.questTool { display: inline-block; background: #f5e6c8; color: #8a5a2a; border-radius: 12px; padding: 3px 10px; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.questAsk { font-size: 15px; line-height: 1.7; color: #4a3c28; }
#writeArea {
  width: 100%; min-height: 120px; border: 2px solid #e5d2ae; border-radius: 14px;
  padding: 12px; font-size: 16px; line-height: 1.8; color: #4a3c28; background: #fffdf7;
  font-family: inherit; resize: none; outline: none; user-select: text; -webkit-user-select: text;
}
#writeArea:focus { border-color: #d9a441; }
#writeMeta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #b0997a; margin: 6px 2px 10px; }
#micTip { font-size: 11px; color: #b0997a; background: #f7ecd5; border-radius: 10px; padding: 6px 10px; margin-bottom: 10px; line-height: 1.6; }

/* ---- 白白的即时回应（这个项目的灵魂） ---- */
#judgeBox { margin-bottom: 12px; }
.jCard { background: #fffdf7; border-radius: 16px; padding: 14px; box-shadow: 0 3px 12px rgba(140,110,70,.18); animation: popIn .3s; }
@keyframes popIn { from { transform: scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
.jTop { display: flex; align-items: center; gap: 10px; }
.jBuddy { display:inline-flex; align-items:center; justify-content:center; }
.jTitle { font-size: 16px; font-weight: 800; color: #7a5a2a; }
.jStars { font-size: 20px; letter-spacing: 2px; }
.jSay { font-size: 14px; color: #6a5a42; margin-top: 8px; line-height: 1.6; background: #f7ecd5; border-radius: 12px; padding: 8px 10px; }
.jDetail { font-size: 12px; color: #8a9a6a; background: #f0f6e8; border-radius: 10px; padding: 6px 10px; margin-top: 8px; }
.jTip { font-size: 13px; border-radius: 10px; padding: 8px 10px; margin-top: 6px; line-height: 1.6; }
.jTip.todo { background: #fff4e0; color: #a06a2a; }
.jTip.up { background: #eef6ff; color: #4a7aaa; }
.jTip.warn { background: #fdeeee; color: #b05a4a; }
.demoBox { background: #f0f6e8; border-radius: 12px; padding: 10px 12px; margin-top: 10px; font-size: 13.5px; line-height: 1.75; color: #4a5a34; }
.demoBox .dt { font-size: 12px; font-weight: 700; color: #6a8a4a; margin-bottom: 3px; }

/* ---- 题材徽章 ---- */
.genreTag { display:inline-block; border-radius:8px; padding:1px 7px; font-size:11px; font-weight:700; margin-right:4px; }
.g-景 { background:#e3f2e0; color:#4a8a3a; }
.g-物 { background:#e6eefc; color:#3a6a9a; }
.g-人 { background:#fce4ec; color:#b04a70; }
.g-事 { background:#fff0d9; color:#c07a2c; }
.g-食 { background:#ffe8e0; color:#c05a3a; }
/* 家长评语卡 */
.cmtCard { background:#fff8e8; border:1.5px solid #f0d9a8; border-radius:14px; padding:12px; margin-bottom:12px; }
.cmtCard .ct { font-size:13px; font-weight:800; color:#c07a2c; margin-bottom:4px; }
.cmtCard .cb { font-size:14px; line-height:1.8; color:#5a4a34; white-space:pre-wrap; }

/* ---- 家长作品工作台 ---- */
.workTabs { display:flex; gap:7px; overflow-x:auto; padding:2px 1px 10px; scrollbar-width:none; }
.workTabs::-webkit-scrollbar { display:none; }
.workTab { flex:0 0 auto; border:1.5px solid #e5d2ae; border-radius:18px; background:#fffdf7; color:#8a6a3a; padding:7px 11px; font:inherit; font-size:12px; font-weight:700; }
.workTab.on { border-color:#c9892d; background:#fff0c9; color:#925a16; }
.workItem { cursor:pointer; border:1.5px solid transparent; }
.workItem:active { transform:scale(.985); }
.workTop { display:flex; align-items:center; gap:9px; margin-bottom:7px; }
.workType { border-radius:10px; padding:3px 8px; font-size:10px; font-weight:800; white-space:nowrap; }
.workType.essay { background:#fff0d9; color:#a85d1f; }
.workType.quest { background:#e9f4e6; color:#4f7f43; }
.workType.idea { background:#f1eafb; color:#77529a; }
.workType.remix { background:#e8f2fa; color:#497595; }
.workDate { margin-left:auto; color:#b0997a; font-size:10px; }
.workPrompt { color:#8a765a; font-size:11px; line-height:1.55; margin-bottom:5px; }
.workText { color:#4a3c28; font-size:14px; line-height:1.75; white-space:pre-wrap; }
.workMeta { color:#a58d6b; font-size:10px; margin-top:7px; }
.aiRef { border:1.5px dashed #bda8cf; background:linear-gradient(145deg,#fbf8ff,#f3edf8); }
.aiRef .aiTitle { color:#75578f; font-size:14px; font-weight:800; }
.aiRef .aiTitle span { margin-left:5px; border-radius:10px; background:#e9dff1; padding:2px 7px; color:#876e99; font-size:9px; vertical-align:2px; }
.aiRef .aiStatus { margin-top:6px; color:#766b80; font-size:12px; line-height:1.75; }
.aiRef .aiSafe { margin-top:8px; padding:7px 9px; border-radius:9px; background:#fff; color:#9a87a7; font-size:10px; line-height:1.55; }
.aiTokenInput { width:100%; box-sizing:border-box; margin-top:9px; border:1.5px solid #cfbddc; border-radius:10px; background:#fff; padding:10px 11px; color:#574661; font:inherit; font-size:13px; outline:none; }
.aiTokenInput:focus { border-color:#8c6ca4; box-shadow:0 0 0 3px rgba(140,108,164,.1); }
.aiRemember { display:flex; align-items:flex-start; gap:6px; margin-top:8px; color:#766b80; font-size:11px; line-height:1.5; }
.aiRemember input { margin-top:2px; accent-color:#80629a; }
.aiChildState { margin-top:8px; border-radius:9px; padding:7px 9px; background:#eef7e9; color:#58764b; font-size:10.5px; line-height:1.6; }
.aiResult { display:grid; gap:8px; margin-top:10px; }
.aiPart { border-radius:11px; background:rgba(255,255,255,.8); padding:9px 10px; color:#65566e; font-size:12px; line-height:1.65; }
.aiPart.good { border-left:3px solid #d6a642; }
.aiPart.check { border-left:3px solid #8196ad; }
.aiPart.suggest { border-left:3px solid #9b76b0; }
.aiPart.rewrite { border-left:3px solid #6e9e82; }
.aiPart b { display:block; margin-bottom:3px; color:#665071; font-size:11px; }
.aiPart p { margin:3px 0; white-space:pre-wrap; }
.aiPart p span { display:inline-block; min-width:32px; margin-right:6px; color:#9a83a6; font-size:10px; font-weight:800; }
.aiPart small { display:block; margin-top:5px; color:#a394aa; font-size:9px; }
.aiActions { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:10px; }
.aiChangeToken { border:0; background:transparent; padding:5px; color:#9a83a6; font:inherit; font-size:10px; text-decoration:underline; cursor:pointer; }
.childAiCoach { border:2px solid #b7d99d; background:linear-gradient(145deg,#f8fff2,#eef9e7); padding:13px; }
#childAiLive { margin-top:10px; }
#childAiLive .childAiCoach { margin-bottom:0; box-shadow:none; }
.childAiLoading, .childAiOffline { border-radius:11px; background:#f4f8ee; padding:9px 10px; color:#708365; font-size:11px; line-height:1.6; }
.childAiRetry { margin-left:6px; border:0; background:transparent; color:#5c7d4c; font:inherit; font-weight:800; text-decoration:underline; }
.childAiHead { display:flex; align-items:center; gap:9px; color:#52733f; }
.childAiHead > span { font-size:30px; }
.childAiHead b { display:block; font-size:15px; }
.childAiHead small { display:block; margin-top:1px; color:#839b75; font-size:10px; font-weight:500; }
.childAiTip { margin-top:10px; border-radius:11px; background:#fffdf7; padding:9px 10px; color:#596c4c; }
.childAiTip b, .childAiExamples > b { display:block; color:#557840; font-size:12px; }
.childAiTip p { margin:4px 0 0; font-size:13px; line-height:1.7; }
.childAiExamples { margin-top:10px; display:grid; gap:8px; }
.childAiExample { display:grid; grid-template-columns:24px minmax(0,1fr); gap:7px; align-items:start; border-radius:12px; background:#fff; padding:9px; box-shadow:0 2px 7px rgba(90,120,65,.08); }
.childAiNum { display:grid; place-items:center; width:23px; height:23px; border-radius:50%; background:#dff0d1; color:#52733f; font-size:11px; font-weight:800; }
.childAiExample small { color:#7b976a; font-size:10px; font-weight:700; }
.childAiExample p { margin:2px 0 7px; color:#4a543f; font-size:13px; line-height:1.7; white-space:pre-wrap; }
.childAiExample .childAiSave { grid-column:2; justify-self:start; margin-top:-3px; }
.childAiExample .childAiSave:disabled { opacity:.65; }
.childAiNote { margin-top:9px; color:#87997b; font-size:10px; line-height:1.6; }
.parentStats { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; text-align:center; }
.parentStats div { min-width:0; padding:4px 2px; }
.parentStats b { display:block; color:#b87324; font-size:20px; }
.parentStats small { color:#a58d6b; font-size:10px; }

/* ---- 宝库 ---- */
.gem { background: #fffdf7; border-radius: 14px; padding: 11px 13px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(140,110,70,.12); }
.gemTag.ai { background:#efe8fa; color:#76588d; }
.gemTxt { font-size: 14px; line-height: 1.7; color: #4a3c28; }
.gemMeta { font-size: 11px; color: #b0997a; margin-top: 5px; display: flex; justify-content: space-between; }
.gemTag { display: inline-block; background: #f5e6c8; color: #8a5a2a; border-radius: 8px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
.remixCall { display:flex; align-items:center; gap:10px; border:2px solid #d9a441; background:linear-gradient(145deg,#fffdf7,#fff3d6); color:#7a5a2a; cursor:pointer; }
.remixCall small { display:block; font-size:11px; color:#b0997a; font-weight:400; margin-top:2px; }
.remixSource { width:100%; background:#fffdf7; border:2px solid #ead9b8; border-radius:12px; padding:10px 12px; margin-bottom:8px; text-align:left; font:inherit; font-size:13px; line-height:1.6; color:#5a4a34; }
.remixSource.sel { border-color:#d9a441; background:#fff3d6; }
#remixTools { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.remixTool { border:2px solid #ead9b8; border-radius:18px; background:#fffdf7; padding:7px 11px; font:inherit; font-size:12px; color:#7a5a2a; }
.remixTool.sel { border-color:#78b85a; background:#edf8e7; color:#477234; }
#remixArea { width:100%; min-height:110px; border:2px solid #e5d2ae; border-radius:14px; padding:12px; font-size:16px; line-height:1.8; color:#4a3c28; background:#fffdf7; font-family:inherit; resize:none; outline:none; user-select:text; -webkit-user-select:text; margin-bottom:10px; }

/* ---- 法宝 ---- */
.toolCard { display: flex; align-items: center; gap: 12px; }
.toolIcon { font-size: 32px; }
.toolName { flex: 1; font-size: 16px; font-weight: 800; color: #7a5a2a; }
.toolSub { font-size: 12px; color: #b0997a; font-weight: 400; display: block; margin-top: 1px; }
.toolLv { font-size: 13px; color: #d9a441; font-weight: 700; }
.teachBox { background: #fffdf7; border-radius: 14px; padding: 14px; font-size: 14px; line-height: 1.9; color: #5a4a34; }

/* ---- 结算 ---- */
#scr-done { text-align: center; padding-top: 24px; }
#doneStars { font-size: 44px; letter-spacing: 6px; }
#doneTitle { font-size: 22px; font-weight: 800; color: #8a5a2a; margin: 8px 0 4px; }
#doneMsg { font-size: 14px; color: #8a7a5a; margin-bottom: 6px; line-height: 1.7; }
#doneCoins { font-size: 20px; font-weight: 800; color: #c08a2a; margin-bottom: 18px; }
.newAward { margin-top:9px; padding:9px; border-radius:12px; background:#fff1bd; color:#9a651e; font-size:14px; font-weight:800; }

/* ---- 反馈 ---- */
#toast { position: fixed; left: 50%; top: 16%; transform: translateX(-50%); background: rgba(90,70,40,.92); color: #fff; border-radius: 16px; padding: 10px 18px; font-size: 14px; font-weight: 700; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .25s; max-width: 84%; text-align: center; line-height: 1.5; }
#toast.show { opacity: 1; }
.confetti { position: fixed; top: -40px; font-size: 24px; z-index: 98; pointer-events: none; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
.coinFly { position: fixed; font-size: 21px; font-weight: 800; color: #c08a2a; z-index: 98; pointer-events: none; animation: flyUp 1s ease-out forwards; }
@keyframes flyUp { to { transform: translateY(-70px); opacity: 0; } }
</style>
